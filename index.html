<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Roma Antiga: Senado, Cônsules e Imperadores</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
            -webkit-user-select: none;
            user-select: none;
        }

        :root {
            --primary: #d4af37; /* Ouro Romano */
            --primary-glow: rgba(212, 175, 55, 0.4);
            --accent: #e5c158; 
            --imperial-red: #800020; /* Borgonha/Púrpura Imperial */
            --bg: #090506; /* Negro Obsidian profundo */
            --bg-card: rgba(18, 11, 13, 0.82);
            --border: rgba(212, 175, 55, 0.18);
            --border-hover: rgba(212, 175, 55, 0.6);
            --text: #f5f0eb;
            --text-muted: #bdafa4;
            --ease-smooth: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Canvas de Partículas de Ouro */
        #goldCanvas {
            position: fixed;
            inset: 0;
            z-index: -2;
            opacity: 0.65;
            pointer-events: none;
        }

        /* Vinheta Imperial para profundidade */
        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, transparent 30%, rgba(5, 2, 3, 0.95) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* Cursor Customizado Realçado */
        #cursor {
            width: 12px;
            height: 12px;
            background: var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: width 0.25s var(--ease-smooth), height 0.25s var(--ease-smooth), background 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 15px var(--primary-glow), 0 0 30px var(--primary-glow);
        }
        #cursor-follower {
            width: 36px;
            height: 36px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.08s ease-out, width 0.25s var(--ease-smooth), height 0.25s var(--ease-smooth), border-color 0.2s;
            opacity: 0.6;
        }
        #cursor.active {
            width: 20px;
            height: 20px;
            background: var(--text);
            box-shadow: 0 0 25px #ffffff;
        }
        #cursor-follower.active {
            width: 56px;
            height: 56px;
            border-color: #ffffff;
            border-width: 1.5px;
            background: rgba(212, 175, 55, 0.05);
        }

        /* Estrutura Principal */
        .stage {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .slider-container {
            width: 100%;
            max-width: 1450px;
            height: 750px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        .slide {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            align-items: center;
            gap: 4rem;
            opacity: 0;
            visibility: hidden;
            transform: translateZ(-500px) rotateX(10deg) scale(0.9);
            transition: opacity 0.9s var(--ease-smooth), visibility 0.9s, transform 1s var(--ease-smooth), filter 0.9s;
            filter: blur(15px);
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateZ(0) rotateX(0deg) scale(1);
            filter: blur(0);
        }

        /* Lado Esquerdo - Informações */
        .info-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 24px;
            background: linear-gradient(90deg, rgba(128, 0, 32, 0.35) 0%, rgba(212, 175, 55, 0.08) 100%);
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--primary);
            width: fit-content;
            margin-bottom: 1.8rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            font-family: 'Cinzel', serif;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1.15;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #ffffff 10%, #f1e0b0 50%, #d4af37 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            letter-spacing: -0.01em;
        }

        /* Card Flutuante Mármore/Glássico */
        .glass-card {
            background: var(--bg-card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 
                0 30px 60px -20px rgba(0, 0, 0, 0.8),
                0 0 50px rgba(212, 175, 55, 0.02) inset;
            position: relative;
            transform-style: preserve-3d;
            transition: border-color 0.4s var(--ease-smooth), box-shadow 0.4s var(--ease-smooth);
        }

        .glass-card::before {
            content: 'SPQR';
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 900;
            opacity: 0.025;
            color: var(--primary);
            pointer-events: none;
            letter-spacing: 10px;
        }

        .glass-card:hover {
            border-color: var(--border-hover);
            box-shadow: 
                0 40px 80px -20px rgba(0, 0, 0, 0.9),
                0 0 30px rgba(212, 175, 55, 0.08) inset,
                0 0 15px rgba(212, 175, 55, 0.1);
        }

        .card-content {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.8;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .card-content::-webkit-scrollbar { width: 5px; }
        .card-content::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        .card-content::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .feature-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .feature-list li {
            display: flex;
            align-items: flex-start;
            gap: 1.2rem;
            transition: transform 0.3s var(--ease-smooth), color 0.3s;
        }
        .feature-list li:hover {
            transform: translateX(10px);
            color: #ffffff;
        }
        .feature-list i {
            margin-top: 4px;
            color: var(--primary);
            font-size: 1.15rem;
            filter: drop-shadow(0 0 8px var(--primary-glow));
        }

        /* Lado Direito - Imagens com Moldura Monumental */
        .visual-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            perspective: 1000px;
        }

        .monumental-frame {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 580px;
            border-radius: 20px;
            padding: 12px;
            background: linear-gradient(145deg, #1c1316 0%, #0d0709 100%);
            box-shadow: 
                0 25px 60px -15px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(212, 175, 55, 0.15);
            transform-style: preserve-3d;
            transition: transform 0.6s var(--ease-smooth);
        }
        .monumental-frame::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 2px;
            background: linear-gradient(to bottom, var(--primary), transparent 40%, var(--primary));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.4;
            pointer-events: none;
        }

        .monumental-frame:hover {
            transform: rotateY(-10deg) rotateX(5deg) scale(1.03);
        }

        .slide-image-wrapper {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
        }

        .slide-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1.5s var(--ease-smooth);
            filter: grayscale(20%) sepia(20%) contrast(110%);
        }
        .monumental-frame:hover .slide-image {
            transform: scale(1.08);
        }

        /* Overlay Decorativo de Templo */
        .temple-cap {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) translateZ(30px);
            width: 120px;
            height: 12px;
            background: var(--primary);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            box-shadow: 0 4px 15px var(--primary-glow);
            opacity: 0.85;
        }

        /* Questionário Interativo (Último Slide) */
        .quiz-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-top: 1rem;
        }
        .quiz-option {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 10px;
            padding: 1.2rem;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            text-align: left;
            font-size: 1rem;
            color: var(--text-muted);
            transition: all 0.3s var(--ease-smooth);
        }
        .quiz-option:hover {
            background: rgba(212, 175, 55, 0.08);
            border-color: var(--primary);
            color: #ffffff;
            transform: translateX(10px);
        }
        .quiz-option.correct {
            background: rgba(46, 117, 89, 0.2) !important;
            border-color: #2e7559 !important;
            color: #4ade80 !important;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.15);
        }
        .quiz-option.wrong {
            background: rgba(128, 0, 32, 0.25) !important;
            border-color: var(--imperial-red) !important;
            color: #f87171 !important;
            box-shadow: 0 0 20px rgba(248, 113, 113, 0.15);
        }
        .quiz-indicator {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .quiz-option:hover .quiz-indicator {
            border-color: var(--primary);
            background: rgba(212, 175, 55, 0.15);
        }

        .feedback-message {
            margin-top: 1.5rem;
            min-height: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s var(--ease-smooth);
        }
        .feedback-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Navegação e UI */
        .nav-ui {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 10px 40px;
            background: rgba(14, 8, 10, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 100px;
            z-index: 1000;
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.8),
                0 0 0 1px rgba(212, 175, 55, 0.05);
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.5rem;
            transition: all 0.4s var(--ease-bounce);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            position: relative;
        }
        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.06);
            transform: scale(0);
            transition: transform 0.4s var(--ease-bounce);
        }
        .nav-btn:hover { 
            color: #fff;
            text-shadow: 0 0 15px var(--primary);
        }
        .nav-btn:hover::before {
            transform: scale(1);
        }
        .nav-btn:active {
            transform: scale(0.9);
        }

        .slide-counter {
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--primary);
            letter-spacing: 6px;
            text-shadow: 0 0 10px var(--primary-glow);
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .slide-counter span {
            font-size: 0.9rem;
            opacity: 0.5;
        }

        /* Barra de Progresso Superior Monumental */
        .progress-line-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: rgba(255,255,255,0.03);
            z-index: 2000;
        }

        .progress-line {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--imperial-red) 0%, var(--primary) 50%, #ffffff 100%);
            box-shadow: 0 0 15px var(--primary);
            transition: width 0.6s var(--ease-smooth);
        }

        /* Rodapé de Controle de Áudio */
        .audio-ctrl {
            position: fixed;
            top: 25px;
            right: 40px;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(14, 8, 10, 0.6);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            backdrop-filter: blur(10px);
        }
        .audio-toggle {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1rem;
            pointer-events: auto;
        }

        /* Ícone S.P.Q.R Decorativo Lateral */
        .decor-spqr {
            position: fixed;
            top: 25px;
            left: 40px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--primary);
            font-size: 1.1rem;
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.8;
        }
        .decor-spqr::after {
            content: '';
            width: 40px;
            height: 1px;
            background: var(--primary);
            display: inline-block;
        }

        /* Animações de Entrada Ativa */
        .slide.active .info-panel .badge { animation: slideUpFade 0.7s var(--ease-smooth) forwards; }
        .slide.active h1 { animation: slideUpFade 0.7s var(--ease-smooth) 0.1s forwards; }
        .slide.active .glass-card { animation: slideUpFade 0.7s var(--ease-smooth) 0.2s forwards; }
        .slide.active .visual-panel { animation: slideLeftFade 0.7s var(--ease-smooth) 0.15s forwards; }

        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(40px) translateZ(-50px); }
            to { opacity: 1; transform: translateY(0) translateZ(0); }
        }
        @keyframes slideLeftFade {
            from { opacity: 0; transform: translateX(60px) rotateY(15deg); }
            to { opacity: 1; transform: translateX(0) rotateY(0); }
        }

        /* Responsividade Extrema */
        @media (max-width: 1100px) {
            .slide {
                grid-template-columns: 1fr;
                gap: 2rem;
                overflow-y: auto;
                height: 100%;
                padding-bottom: 80px;
            }
            .visual-panel {
                order: -1;
                height: 300px;
            }
            .monumental-frame {
                height: 100%;
                max-width: 100%;
                aspect-ratio: 16/9;
            }
            h1 {
                font-size: 2.2rem;
                margin-bottom: 1rem;
            }
            .badge {
                margin-bottom: 1rem;
            }
            .glass-card {
                padding: 1.5rem;
            }
            .slider-container {
                height: 90vh;
            }
        }
    </style>
</head>
<body>

    <div class="progress-line-container">
        <div class="progress-line" id="bar"></div>
    </div>
    <canvas id="goldCanvas"></canvas>
    <div class="vignette"></div>

    <!-- Elementos de Decoração Superior -->
    <div class="decor-spqr">S.P.Q.R</div>
    <div class="audio-ctrl">
        <span>Transições Sonoras</span>
        <button class="audio-toggle" id="audioBtn" title="Ativar/Mudar Som"><i class="fa-solid fa-volume-high"></i></button>
    </div>

    <!-- Cursores Virtuais Avançados -->
    <div id="cursor"></div>
    <div id="cursor-follower"></div>

    <!-- Palco Principal de Apresentação -->
    <div class="stage">
        <div class="slider-container" id="slider"></div>
    </div>

    <!-- Console de Navegação -->
    <nav class="nav-ui">
        <button class="nav-btn" id="prevBtn" title="Anterior (Seta Esquerda)"><i class="fa-solid fa-angles-left"></i></button>
        <div class="slide-counter" id="counter">1 <span>/ 10</span></div>
        <button class="nav-btn" id="nextBtn" title="Próximo (Seta Direita)"><i class="fa-solid fa-angles-right"></i></button>
    </nav>

    <script>
        (function(){
            "use strict";

            // ========== GERADOR DE EFEITOS SONOROS (WEB AUDIO API) ==========
            let soundEnabled = true;
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            function playSound(type) {
                if (!soundEnabled) return;
                
                // Retomar contexto de áudio se suspenso (política de navegadores)
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                try {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);

                    if (type === 'swipe') {
                        // Varredura de frequência majestosa para transição de slides
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(320, audioCtx.currentTime + 0.5);
                        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.55);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.6);
                    } else if (type === 'click') {
                        // Clique suave metálico ao interagir
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
                        gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.2);
                    } else if (type === 'correct') {
                        // Sucesso (Acorde de trombeta romana sutil)
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(330, audioCtx.currentTime); // Mi
                        osc.frequency.setValueAtTime(392, audioCtx.currentTime + 0.1); // Sol
                        osc.frequency.setValueAtTime(523, audioCtx.currentTime + 0.2); // Dó
                        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.6);
                    } else if (type === 'wrong') {
                        // Erro (Frequência baixa descendente)
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(180, audioCtx.currentTime);
                        osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 0.3);
                        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.45);
                        osc.start();
                        osc.stop(audioCtx.currentTime + 0.5);
                    }
                } catch (e) {
                    console.log("Erro ao inicializar áudio sintetizado:", e);
                }
            }

            // Controle de ativação de som
            const audioBtn = document.getElementById('audioBtn');
            audioBtn.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                if (soundEnabled) {
                    audioBtn.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                    audioBtn.style.color = 'var(--primary)';
                    playSound('click');
                } else {
                    audioBtn.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                    audioBtn.style.color = 'var(--text-muted)';
                }
            });


            // ========== FUNDO DE PARTÍCULAS EM OURO FLUTUANTE ==========
            const canvas = document.getElementById('goldCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            const particles = [];
            const numParticles = 65;

            function resizeCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            class GoldParticle {
                constructor() {
                    this.reset();
                    this.y = Math.random() * height;
                }
                reset() {
                    this.x = Math.random() * width;
                    this.y = height + 10;
                    this.vx = (Math.random() - 0.5) * 0.35;
                    this.vy = -(0.2 + Math.random() * 0.5);
                    this.radius = 0.8 + Math.random() * 1.8;
                    this.alpha = 0.1 + Math.random() * 0.5;
                    this.wobble = Math.random() * Math.PI;
                    this.wobbleSpeed = 0.01 + Math.random() * 0.02;
                }
                update() {
                    this.y += this.vy;
                    this.x += this.vx + Math.sin(this.wobble) * 0.15;
                    this.wobble += this.wobbleSpeed;
                    
                    if (this.y < -10 || this.x < -10 || this.x > width + 10) {

                bar.style.width = `${((currentIdx + 1) / slidesData.length) * 100}%`;
                // Mostrar a seção atual em número real (de 1 a 10) conforme solicitado
                counter.innerHTML = `${currentIdx + 1} <span>/ 10</span>`;
            }

            function moveSlide(delta) {
                playSound('swipe');
                slides[currentIdx].classList.remove('active');
                currentIdx = (currentIdx + delta + slidesData.length) % slidesData.length;
                slides[currentIdx].classList.add('active');
                updateUI();
                
                const btn = delta > 0 ? nextBtn : prevBtn;
                btn.style.transform = 'scale(1.25)';
                setTimeout(() => btn.style.transform = '', 180);
            }

            prevBtn.addEventListener('click', () => moveSlide(-1));
            nextBtn.addEventListener('click', () => moveSlide(1));

            // ========== CURSOR CUSTOMIZADO FLUIDO COM PARALLAX ==========
            let mouseX = 0, mouseY = 0;
            let currentX = 0, currentY = 0;

            document.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;

                const rotX = (window.innerHeight / 2 - mouseY) / 75;
                const rotY = (window.innerWidth / 2 - mouseX) / 75;
                const container = document.querySelector('.slider-container');
                if (container) {
                    container.style.transform = `rotateX(${rotX}deg) rotateY(${-rotY}deg) translateZ(10px)`;
                }
            });

            function animateCursor() {
                const speed = 0.16;
                currentX += (mouseX - currentX) * speed;
                currentY += (mouseY - currentY) * speed;

                cursor.style.left = mouseX + 'px';
                cursor.style.top = mouseY + 'px';

                cursorFollower.style.left = currentX + 'px';
                cursorFollower.style.top = currentY + 'px';

                requestAnimationFrame(animateCursor);
            }
            animateCursor();

            // Interação 3D individual nos cards (mármores do senado)
            document.querySelectorAll('.glass-card').forEach(card => {
                card.addEventListener('mousemove', (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    card.style.transform = `perspective(1000px) rotateX(${y * 12}deg) rotateY(${x * 12}deg) translateY(-8px) translateZ(35px)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = '';
                });
            });

            // Ativação do cursor para elementos clicáveis
            document.querySelectorAll('button, .glass-card, .quiz-option').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    cursor.classList.add('active');
                    cursorFollower.classList.add('active');
                });
                el.addEventListener('mouseleave', () => {
                    cursor.classList.remove('active');
                    cursorFollower.classList.remove('active');
                });
            });

            // Navegação por teclado
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') moveSlide(1);
                if (e.key === 'ArrowLeft') moveSlide(-1);
            });


            // ========== INTERATIVIDADE DO QUIZ (SLIDE 7) ==========
            const quizOptions = document.querySelectorAll('.quiz-option');
            const feedback = document.getElementById('feedback');

            quizOptions.forEach(opt => {
                opt.addEventListener('click', function() {
                    const isCorrect = this.getAttribute('data-correct') === 'true';
                    
                    quizOptions.forEach(o => {
                        o.classList.remove('correct', 'wrong');
                        o.style.pointerEvents = 'none'; // Travar após votar
                    });

                    if (isCorrect) {
                        this.classList.add('correct');
                        feedback.style.color = '#4ade80';
                        feedback.innerHTML = '<i class="fa-solid fa-circle-check"></i> Resposta Correta! Ave, Cidadão! O mandato de 1 ano e o veto mútuo evitavam que os Cônsules agissem como reis tiranos.';
                        playSound('correct');
                    } else {
                        this.classList.add('wrong');
                        feedback.style.color = '#f87171';
                        feedback.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> Resposta Incorreta! Tente novamente na próxima apresentação.';
                        playSound('wrong');

                        setTimeout(() => {
                            const correctBtn = document.querySelector('.quiz-option[data-correct="true"]');
                            if (correctBtn) correctBtn.classList.add('correct');
                        }, 500);
                    }
                    feedback.classList.add('show');
                });
            });

            updateUI();
        })();
    </script>
</body>
</html>
